spring.application.name=smart-campus


server.port=8080
server.error.include-message=always

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=500MB

spring.datasource.url=${SMART_CAMPUS_DATASOURCE_URL:jdbc:mysql://localhost:3306/paf_uni_smart_class_group_project}
spring.datasource.username=${SMART_CAMPUS_DATASOURCE_USERNAME:root}
spring.datasource.password=${SMART_CAMPUS_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.jpa.hibernate.ddl-auto=update

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMART_CAMPUS_MAIL_USERNAME:}
spring.mail.password=${SMART_CAMPUS_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jwt.secret=${SMART_CAMPUS_JWT_SECRET:}

spring.cookie.secure=false
spring.cookie.same-site=Lax

# Google OAuth credentials are intentionally not committed.
